name: special_characters_handler
description: A powerful framework for handling special characters, emojis, and HTML entities in strings
version: 1.1.1
homepage: https://github.com/yourusername/special_characters_handler
repository: https://github.com/yourusername/special_characters_handler

environment:
  sdk: ^3.3.4

dependencies:
  # Pour le support des expressions régulières avancées et Unicode
  characters: ^1.3.0

  # Pour le décodage des entités HTML
  html_unescape: ^2.0.0

  # Pour les collections et utilitaires
  collection: ^1.18.0

  # Pour les annotations et la méta-programmation
  meta: ^1.11.0

  # Pour le support Unicode
  unicode: ^0.3.1


dev_dependencies:
  # Outils de développement
  lints: ^3.0.0
  test: ^1.24.0
  mockito: ^5.4.4

  # Pour la génération de code et documentation
  build_runner: ^2.4.8
  dartdoc: ^6.3.0

# Configurations supplémentaires
topics:
  - string
  - text-processing
  - unicode
  - html
  - emoji

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

# Configuration de publication
publish_to: https://pub.dev/